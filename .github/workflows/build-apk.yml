name: Build Android APK

on:
  push:
    branches: [Android]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Auto-increment version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          NEW=$(npx semver "$CURRENT" -i patch)
          npm version "$NEW" --no-git-tag-version
          echo "VERSION=$NEW" >> "$GITHUB_ENV"

          # Calcola versionCode incrementale dal numero di commit
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Update Android versionCode and versionName
        run: |
          sed -i "s/versionCode 1/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$VERSION\"/" android/app/build.gradle

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/release-keystore.jks

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build release APK
        if: env.HAS_KEYSTORE == 'true'
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release-keystore.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: home-manager-debug-v${{ env.VERSION }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: home-manager-release-v${{ env.VERSION }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore: bump version to v$VERSION [skip ci]"
          git push
